version: "3.1"

rules:
  - rule: Say goodbye anytime the user says goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Greet user
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Handle health concerns directly
    steps:
      - intent: symptom_report
      - action: action_check_symptoms

  - rule: Handle emergency situation
    steps:
      - intent: emergency
      - action: action_emergency_check

  - rule: Implementation of Fallback
    steps:
    - intent: nlu_fallback
    - action: utter_default
